<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Sign In | Children's Ministry Lessons</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>

<div class="auth-page auth-page--centered">
  <div class="auth-centered-card">
    <a href="index.html" class="auth-logo" style="justify-content:center; margin-bottom:1.5rem;">
      <div class="auth-logo__icon" style="background:var(--navy);">🛡️</div>
      <div>
        <div class="auth-logo__name">Admin<span>Panel</span></div>
        <div class="auth-logo__sub">Children's Ministry Lessons</div>
      </div>
    </a>

    <!-- SIGN IN MODE -->
    <div id="signin-mode">
      <div class="auth-right__header" style="text-align:center;">
        <h2 class="auth-form-title">Admin Sign In</h2>
        <p class="auth-form-sub">Restricted access — authorized administrators only.</p>
      </div>

      <div class="auth-error" id="admin-login-error" style="display:none;"></div>

      <form id="admin-login-form" onsubmit="handleAdminLogin(event)">
        <div class="auth-field">
          <label class="auth-label" for="admin-email">Email address</label>
          <input type="email" id="admin-email" class="auth-input" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="admin-password">Password</label>
          <div class="auth-input-wrap">
            <input type="password" id="admin-password" class="auth-input" placeholder="Your password" autocomplete="current-password" required />
            <button type="button" class="auth-pw-toggle" onclick="togglePassword('admin-password', this)">👁️</button>
          </div>
        </div>
        <button type="submit" class="auth-submit-btn" id="admin-login-btn" data-original="Sign In →">Sign In →</button>
      </form>

      <p style="text-align:center; margin-top:1.25rem; font-size:0.8rem; color:var(--gray-400);">
        Setting up for the first time? <a href="#" class="auth-link" onclick="showSetup(); return false;">Create the admin account →</a>
      </p>
    </div>

    <!-- FIRST-RUN SETUP MODE -->
    <div id="setup-mode" style="display:none;">
      <div class="auth-right__header" style="text-align:center;">
        <h2 class="auth-form-title">Create Admin Account</h2>
        <p class="auth-form-sub">This runs once — the first admin account for this site.</p>
      </div>

      <div class="auth-error" id="admin-setup-error" style="display:none;"></div>

      <form id="admin-setup-form" onsubmit="handleAdminSetup(event)">
        <div class="auth-field">
          <label class="auth-label" for="setup-name">Full name</label>
          <input type="text" id="setup-name" class="auth-input" placeholder="Your full name" required />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="setup-email">Email address</label>
          <input type="email" id="setup-email" class="auth-input" placeholder="you@example.com" required />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="setup-password">Password</label>
          <div class="auth-input-wrap">
            <input type="password" id="setup-password" class="auth-input" placeholder="Min. 6 characters" required />
            <button type="button" class="auth-pw-toggle" onclick="togglePassword('setup-password', this)">👁️</button>
          </div>
        </div>
        <button type="submit" class="auth-submit-btn" id="admin-setup-btn" data-original="Create Admin Account →">Create Admin Account →</button>
      </form>

      <p style="text-align:center; margin-top:1.25rem; font-size:0.8rem; color:var(--gray-400);">
        Already have an admin account? <a href="#" class="auth-link" onclick="showSignin(); return false;">Sign in →</a>
      </p>
    </div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script src="admin-data.js"></script>
<script src="auth.js"></script>
<script>
function showSetup() {
  document.getElementById('signin-mode').style.display = 'none';
  document.getElementById('setup-mode').style.display = 'block';
}
function showSignin() {
  document.getElementById('setup-mode').style.display = 'none';
  document.getElementById('signin-mode').style.display = 'block';
}

onFirebaseReady(() => {
  // If already signed in as admin, skip straight to the panel.
  auth.onAuthStateChanged(user => {
    if (user) {
      const rec = GK.getUserRecord(user.uid);
      if (rec && rec.isAdmin) { window.location.href = 'admin.html'; return; }
    }
  });

  // If no admin exists yet, default to setup mode.
  const hasAdmin = GK.listUsers().some(u => u.isAdmin);
  if (!hasAdmin) showSetup();
});

async function handleAdminLogin(e) {
  e.preventDefault();
  clearAuthError('admin-login-error');
  const email = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-password').value;
  const btn = document.getElementById('admin-login-btn');
  btn.dataset.original = btn.innerHTML;
  setLoading('admin-login-btn', true, 'Signing in...');
  try {
    const cred = await auth.signInWithEmailAndPassword(email, password);
    const rec = GK.getUserRecord(cred.user.uid);
    if (!rec || !rec.isAdmin) {
      await auth.signOut();
      setLoading('admin-login-btn', false);
      return showAuthError('admin-login-error', 'This account does not have admin access.');
    }
    window.location.href = 'admin.html';
  } catch (err) {
    setLoading('admin-login-btn', false);
    showAuthError('admin-login-error', friendlyError(err.code));
  }
}

async function handleAdminSetup(e) {
  e.preventDefault();
  clearAuthError('admin-setup-error');
  if (GK.listUsers().some(u => u.isAdmin)) {
    return showAuthError('admin-setup-error', 'An admin account already exists. Please sign in instead.');
  }
  const name = document.getElementById('setup-name').value.trim();
  const email = document.getElementById('setup-email').value.trim();
  const password = document.getElementById('setup-password').value;
  const btn = document.getElementById('admin-setup-btn');
  btn.dataset.original = btn.innerHTML;
  setLoading('admin-setup-btn', true, 'Creating...');
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, password);
    await cred.user.updateProfile({ displayName: name });
    GK.updateUserRecord(cred.user.uid, { isAdmin: true });
    window.location.href = 'admin.html';
  } catch (err) {
    setLoading('admin-setup-btn', false);
    showAuthError('admin-setup-error', friendlyError(err.code));
  }
}
</script>
</body>
</html>
